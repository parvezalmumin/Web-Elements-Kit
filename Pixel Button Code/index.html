<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Buttons</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="button-grid">
  <button class="pixel-btn settings">SETTINGS</button>
  <button class="pixel-btn options">OPTIONS</button>
  <button class="pixel-btn pause">PAUSE</button>
  <button class="pixel-btn play">PLAY</button>
  <button class="pixel-btn menu">MENU</button>
  <button class="pixel-btn start">START</button>
  <button class="pixel-btn exit">EXIT</button>
</div>

</body>
</html>
